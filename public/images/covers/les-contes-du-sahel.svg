<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 400" width="280" height="400">
  <defs>
    <linearGradient id="bg-10" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#92400E"/>
      <stop offset="100%" stop-color="#92400E" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="shine-10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.15"/>
    </linearGradient>
    <pattern id="pat-10" patternUnits="userSpaceOnUse" width="30" height="30">
      <path d="M0,15 L7.5,0 L15,15 L22.5,0 L30,15" fill="none" stroke="#FBBF24" stroke-width="0.5" opacity="0.12"/><path d="M0,30 L7.5,15 L15,30 L22.5,15 L30,30" fill="none" stroke="#FBBF24" stroke-width="0.5" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Fond principal -->
  <rect width="280" height="400" rx="4" fill="url(#bg-10)"/>

  <!-- Motif africain -->
  <rect width="280" height="400" rx="4" fill="url(#pat-10)"/>

  <!-- Bande décorative haute -->
  <rect x="0" y="0" width="280" height="6" fill="#FBBF24" opacity="0.8"/>

  <!-- Ligne accent -->
  <rect x="30" y="60" width="40" height="3" rx="1.5" fill="#FBBF24" opacity="0.9"/>

  <!-- Catégorie -->
  <text x="30" y="50" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#FBBF24" letter-spacing="3" font-weight="600">CONTE</text>

  <!-- Titre -->
  <text x="30" y="155" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="bold" fill="white" letter-spacing="0.5">Les Contes</text>
<text x="30" y="187" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="bold" fill="white" letter-spacing="0.5">du Sahel</text>


  <!-- Séparateur -->
  <rect x="30" y="230" width="220" height="1" fill="#FBBF24" opacity="0.3"/>

  <!-- Auteur -->
  <text x="30" y="255" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#FBBF24" opacity="0.9" font-weight="500">Collectif BF</text>

  <!-- Pied de page -->
  <rect x="0" y="360" width="280" height="40" fill="black" opacity="0.2"/>
  <text x="30" y="385" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="white" opacity="0.6" letter-spacing="1">MERCURY ÉDITIONS</text>
  <text x="250" y="385" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="white" opacity="0.5" text-anchor="end">2010</text>

  <!-- Tranche gauche (effet livre) -->
  <rect x="0" y="0" width="4" height="400" rx="2" fill="black" opacity="0.15"/>

  <!-- Brillance -->
  <rect width="280" height="400" rx="4" fill="url(#shine-10)"/>
</svg>