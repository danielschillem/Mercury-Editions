services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    environment:
      WAIT_FOR_DB: "true"
      RUN_MIGRATIONS: "true"
    volumes:
      - .:/var/www/html
      - mercury_vendor:/var/www/html/vendor
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "php -r '$$s = @fsockopen(\"127.0.0.1\", 9000); exit($$s ? 0 : 1);'"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - mercury_vendor:/var/www/html/vendor:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy

  vite:
    image: node:22-alpine
    working_dir: /var/www/html
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_PROXY_TARGET: http://web
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html
      - mercury_node_modules:/var/www/html/node_modules

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    environment:
      WAIT_FOR_DB: "true"
    command: php artisan queue:work redis --sleep=1 --tries=3 --timeout=120
    volumes:
      - .:/var/www/html
      - mercury_vendor:/var/www/html/vendor
    depends_on:
      app:
        condition: service_healthy
      pgsql:
        condition: service_healthy
      redis:
        condition: service_started

  pgsql:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mercury
      POSTGRES_USER: mercury
      POSTGRES_PASSWORD: mercury
    ports:
      - "5432:5432"
    volumes:
      - mercury_pgsql:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mercury -d mercury"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - mercury_redis:/data

volumes:
  mercury_vendor:
  mercury_node_modules:
  mercury_pgsql:
  mercury_redis:
