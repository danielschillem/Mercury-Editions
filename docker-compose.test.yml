services:
  tests:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.testing
    environment:
      APP_ENV: testing
      DB_CONNECTION: sqlite
      DB_DATABASE: /tmp/mercury-testing.sqlite
      DB_URL: ""
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
      WAIT_FOR_DB: "false"
      RUN_MIGRATIONS: "false"
    command: >
      sh -lc "rm -f /tmp/mercury-testing.sqlite
      && touch /tmp/mercury-testing.sqlite
      && php artisan config:clear
      && export APP_KEY=$$(php -r 'echo \"base64:\".base64_encode(random_bytes(32));')
      && php artisan test"
    volumes:
      - .:/var/www/html
      - mercury_vendor:/var/www/html/vendor
    tmpfs:
      - /tmp
